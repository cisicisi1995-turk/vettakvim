# Render.com yapılandırması (Blueprint)
# Render bu dosyayı okuyarak servisi otomatik kurar.
services:
  - type: web
    name: vettakvim
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
